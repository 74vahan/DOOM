# ============================================================
# nginx.conf — reverse proxy для игры.
# Nginx принимает запросы на порту 80 (обычный HTTP)
# и передаёт их Node-приложению на localhost:3000.
# Файл кладётся в /etc/nginx/sites-available/doomgame
# (setup.sh делает это сам).
# ============================================================

server {
    listen 80;
    server_name _;   # отвечаем на любой домен/IP

    # Сжатие текстовых файлов — страница грузится быстрее
    gzip on;
    gzip_types text/css application/javascript application/json;

    location / {
        # Куда пересылать запросы
        proxy_pass http://127.0.0.1:3000;

        # Передаём приложению настоящий IP и хост клиента
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
