<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIBEDOOM — ретро-шутер</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <h1 class="logo">VIBE<span>DOOM</span></h1>

    <!-- Игровой экран: низкое разрешение, растянутое CSS-ом (крупные пиксели) -->
    <canvas id="screen" width="320" height="200"></canvas>

    <p class="hint">
      WASD — движение &nbsp;|&nbsp; стрелки / мышь — поворот &nbsp;|&nbsp;
      ПРОБЕЛ / клик — выстрел &nbsp;|&nbsp; M — звук вкл/выкл &nbsp;|&nbsp; v2.1
    </p>

    <!-- Экран входа: игра начнётся только после авторизации -->
    <div id="auth-overlay" class="overlay">
      <h2>КТО ИДЁТ В АД?</h2>
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Вход</button>
        <button class="auth-tab" data-mode="register">Регистрация</button>
      </div>
      <div class="auth-form">
        <input id="auth-name" maxlength="16" placeholder="Имя бойца" autocomplete="username">
        <input id="auth-password" type="password" maxlength="64" placeholder="Пароль" autocomplete="current-password">
        <div id="age-row" style="display:none">
          <input id="auth-age" type="number" min="5" max="120" placeholder="Возраст (18+)">
        </div>
        <p id="auth-error" class="auth-error"></p>
        <button id="auth-submit">В бой!</button>
        <p class="auth-note">Игра 18+. Возраст и имя сохраняются в базе данных.</p>
      </div>
    </div>

    <!-- Оверлей конца игры: счёт и таблица рекордов -->
    <div id="overlay" class="overlay hidden">
      <h2 id="overlay-title">ТЫ ПОГИБ</h2>
      <p id="overlay-score">Счёт: 0</p>
      <div id="highscores"></div>
      <button id="restart">Играть снова (Enter)</button>
    </div>
  </div>

  <!-- Порядок подключения важен: сначала конфиг и данные, потом движок, потом игра -->
  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/player.js"></script>
  <script src="js/input.js"></script>
  <script src="js/raycaster.js"></script>
  <script src="js/music.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/weapon.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/score.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
