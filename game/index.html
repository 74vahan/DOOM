<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIBEDOOM — ретро-шутер</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <h1 class="logo">VIBE<span>DOOM</span></h1>

    <!-- Игровой экран: низкое разрешение, растянутое CSS-ом (крупные пиксели) -->
    <canvas id="screen" width="320" height="200"></canvas>

    <p class="hint">
      WASD — движение &nbsp;|&nbsp; стрелки / мышь — поворот &nbsp;|&nbsp;
      ПРОБЕЛ / клик — выстрел &nbsp;|&nbsp; кликни по экрану для захвата мыши
    </p>

    <!-- Оверлей конца игры: ввод имени и таблица рекордов -->
    <div id="overlay" class="overlay hidden">
      <h2 id="overlay-title">ТЫ ПОГИБ</h2>
      <p id="overlay-score">Счёт: 0</p>
      <div id="name-form">
        <input id="player-name" maxlength="16" placeholder="Твоё имя" autocomplete="off">
        <button id="save-score">Сохранить рекорд</button>
      </div>
      <div id="highscores"></div>
      <button id="restart">Играть снова (Enter)</button>
    </div>
  </div>

  <!-- Порядок подключения важен: сначала конфиг и данные, потом движок, потом игра -->
  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/player.js"></script>
  <script src="js/input.js"></script>
  <script src="js/raycaster.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/weapon.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/score.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
